<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="ClawFace mobile app preview graphic">
  <defs>
    <linearGradient id="bgGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1a28"/>
      <stop offset="100%" stop-color="#17141d"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#201c2a"/>
      <stop offset="100%" stop-color="#1a1622"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="800" height="600" fill="url(#bgGlow)"/>

  <!-- subtle accent rings behind phone -->
  <circle cx="400" cy="300" r="230" fill="none" stroke="#0a2463" stroke-opacity="0.45" stroke-width="1.5"/>
  <circle cx="400" cy="300" r="180" fill="none" stroke="#fe5f55" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- phone frame -->
  <rect x="290" y="70" width="220" height="460" rx="34" fill="#100d16" stroke="#3a3346" stroke-width="2.5"/>
  <!-- screen -->
  <rect x="302" y="82" width="196" height="436" rx="24" fill="url(#screenGrad)"/>
  <!-- notch -->
  <rect x="368" y="92" width="64" height="10" rx="5" fill="#100d16"/>

  <!-- status header inside screen -->
  <circle cx="322" cy="126" r="6" fill="#fe5f55"/>
  <rect x="336" y="121" width="90" height="10" rx="5" fill="#3a3346"/>
  <rect x="452" y="121" width="30" height="10" rx="5" fill="#0a2463"/>

  <!-- agent chat bubbles -->
  <rect x="318" y="152" width="130" height="34" rx="10" fill="#241f30"/>
  <rect x="328" y="163" width="86" height="6" rx="3" fill="#4a4258"/>
  <rect x="328" y="173" width="60" height="6" rx="3" fill="#3a3346"/>

  <rect x="352" y="196" width="130" height="26" rx="10" fill="#0a2463" fill-opacity="0.85"/>
  <rect x="362" y="206" width="96" height="6" rx="3" fill="#7d90c9"/>

  <rect x="318" y="232" width="150" height="34" rx="10" fill="#241f30"/>
  <rect x="328" y="243" width="104" height="6" rx="3" fill="#4a4258"/>
  <rect x="328" y="253" width="74" height="6" rx="3" fill="#3a3346"/>

  <!-- tool activity line -->
  <circle cx="326" cy="286" r="4" fill="#fe5f55"/>
  <rect x="338" y="282" width="110" height="8" rx="4" fill="#3a3346"/>

  <!-- approval card -->
  <rect x="316" y="306" width="168" height="96" rx="12" fill="#241f30" stroke="#fe5f55" stroke-opacity="0.6" stroke-width="1.5"/>
  <rect x="330" y="320" width="100" height="8" rx="4" fill="#5a5168"/>
  <rect x="330" y="336" width="140" height="6" rx="3" fill="#3a3346"/>
  <rect x="330" y="348" width="118" height="6" rx="3" fill="#3a3346"/>
  <!-- approve / deny buttons -->
  <rect x="330" y="366" width="66" height="22" rx="11" fill="#fe5f55"/>
  <rect x="404" y="366" width="66" height="22" rx="11" fill="none" stroke="#5a5168" stroke-width="1.5"/>

  <!-- more chat below -->
  <rect x="318" y="418" width="118" height="26" rx="10" fill="#241f30"/>
  <rect x="328" y="428" width="80" height="6" rx="3" fill="#3a3346"/>

  <!-- input bar -->
  <rect x="316" y="470" width="168" height="30" rx="15" fill="#241f30" stroke="#3a3346" stroke-width="1"/>
  <circle cx="468" cy="485" r="10" fill="#0a2463"/>
  <path d="M464 485 l4 -5 4 5 -4 2 z" fill="#9fb0dd"/>

  <!-- caption -->
  <text x="400" y="566" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="24" fill="#e9e4f0" letter-spacing="2">ClawFace</text>
  <text x="400" y="588" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="13" fill="#8a8296" letter-spacing="1">preview coming soon</text>
</svg>
